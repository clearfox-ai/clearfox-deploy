services:
  portal:
    image: docker.clearfox.ai/portal:${IMAGE_TAG:-latest}
    ports:
      - "${CLEARFOX_PORT:-3000}:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORTAL_MONGO_URI=mongodb://mongodb:27017/clearfox
      - PORTAL_SECRETS_KEY
      - PORTAL_INTERNAL_AUTH_KEY
    volumes:
      # On-disk cache for TS-native integrations (git clones, etc.).
      - integration_data:/app/integration-data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # Give the portal time to drain in-flight chat streams on redeploy before
    # Docker SIGKILLs it (default is 10s). Matches beginShutdown's 25s budget.
    stop_grace_period: 30s

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # --- MCP servers ---
  # Integration configs are managed via Admin UI → Integrations.
  # No environment variables needed — credentials stored in MongoDB.

  mcp-mongodb:
    image: docker.clearfox.ai/mcp-mongodb:${IMAGE_TAG:-latest}
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-mysql:
    image: docker.clearfox.ai/mcp-mysql:${IMAGE_TAG:-latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-google-analytics:
