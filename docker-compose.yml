      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-code:
    image: docker.clearfox.ai/mcp-code:${IMAGE_TAG:-latest}
    volumes:
      - repos:/app/repos
      - chroma_db:/app/chroma_db
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-fetch:
    image: docker.clearfox.ai/mcp-fetch:${IMAGE_TAG:-latest}
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-search:
    image: docker.clearfox.ai/mcp-search:${IMAGE_TAG:-latest}
