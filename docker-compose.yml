  mcp-git:
    image: docker.clearfox.ai/mcp-git:${IMAGE_TAG:-latest}
    volumes:
      - repos:/app/repos
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-freshservice:
    image: docker.clearfox.ai/mcp-freshservice:${IMAGE_TAG:-latest}
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  mcp-notion:
    image: docker.clearfox.ai/mcp-notion:${IMAGE_TAG:-latest}
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    restart: on-failure

  agent-scheduler:
    image: alpine:3.19
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl > /dev/null 2>&1
        echo "[agent-scheduler] Starting. Polling every 60s."
        trap 'exit 0' TERM INT
        while true; do
          if [ -n "$$PORTAL_INTERNAL_AUTH_KEY" ]; then
            curl -sf -H "Authorization: Bearer $$PORTAL_INTERNAL_AUTH_KEY" \
              "http://portal:3000/api/internal/agent/cron" || true
          fi
          sleep 60 &
          wait $!
        done
    environment:
      - PORTAL_INTERNAL_AUTH_KEY
    depends_on:
      portal:
        condition: service_healthy
    stop_grace_period: 3s
    restart: unless-stopped

volumes:
  repos:
  chroma_db:
  memory_data:
  integration_data:
  mongo_data:
